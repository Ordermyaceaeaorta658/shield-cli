name: Shield CLI — CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Check imports
        run: |
          python -c "from cli.main import app; print('CLI OK')"
          python -c "from ai.client import AIClient; print('AI Client OK')"
          python -c "from core.workflow import WorkflowEngine; print('Workflow OK')"
          python -c "from utils.input_validator import validate_target; print('Validator OK')"
